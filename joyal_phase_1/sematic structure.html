<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Semantic Page</title>
</head>
<body>

    <header>
        <h1>My Simple Website</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <main>
        <section>
            <h2>Welcome</h2>
            <p>This is a simple webpage using semantic HTML elements.</p>
        </section>

        <article>
            <h2>Latest News</h2>
            <p>This is an example of an article section.</p>
        </article>
    </main>

    <aside>
        <h3>Related Links</h3>
        <p>Additional content can go here.</p>
    </aside>

    <footer>
        <p>&copy; 2026 My Simple Website</p>
    </footer>

</body>
</html>
