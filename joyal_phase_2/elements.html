<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display Properties Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h2 {
      margin-top: 30px;
    }
    .box {
      padding: 10px;
      margin: 5px;
      color: #000;
    }
  </style>
</head>
<body>

  <h1>CSS Display Properties Demo</h1>

  <h2>1. Block</h2>
  <div class="box" style="display: block; background: lightblue;">
    Block Element 1
  </div>
  <div class="box" style="display: block; background: lightgreen;">
    Block Element 2
  </div>

  <h2>2. Inline</h2>
  <span class="box" style="display: inline; background: pink;">
    Inline 1
  </span>
  <span class="box" style="display: inline; background: orange;">
    Inline 2
  </span>

  <h2>3. Inline-Block</h2>
  <div class="box" style="display: inline-block; width: 100px; height: 50px; background: coral;">
    Box 1
  </div>
  <div class="box" style="display: inline-block; width: 100px; height: 50px; background: teal;">
    Box 2
  </div>
  <h2>4. None</h2>
  <div class="box" style="display: none;">
    You won't see this
  </div>

  <h2>5. Flex</h2>
  <div style="display: flex; gap: 10px; background: #eee; padding: 10px;">
    <div class="box" style="background: lightcoral;">Flex 1</div>
    <div class="box" style="background: lightseagreen;">Flex 2</div>
    <div class="box" style="background: lightsalmon;">Flex 3</div>
  </div>

  <h2>6. Grid</h2>
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
    <div class="box" style="background: lavender;">Grid 1</div>
    <div class="box" style="background: lightyellow;">Grid 2</div>
    <div class="box" style="background: lightgray;">Grid 3</div>
  </div>

</body>
</html>
