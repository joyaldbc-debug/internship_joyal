<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Layout</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
    }

    .sidebar {
      background: #f4f4f4;
      padding: 20px;
      flex: 1;
      min-width: 200px;
    }

    .content {
      background: #ddd;
      padding: 20px;
      flex: 3;
      min-width: 300px;
    }

    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }
    .container {
      flex-direction: row;
    }
    @media (max-width: 1023px) {
      .container {
        flex-direction: column;
      }

      .sidebar, .content {
        width: 100%;
      }
    }
    @media (max-width: 767px) {
      .header {
        font-size: 18px;
      }

      .sidebar {
        background: #e0e0e0;
      }

      .content {
        font-size: 14px;
      }
    }

  </style>
</head>

<body>

  <div class="header">
    <h1>My Responsive Page</h1>
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>Sidebar</h3>
      <p>Links / Menu</p>
    </div>

    <div class="content">
      <h2>Main Content</h2>
      <p>This layout adjusts based on screen size.</p>
    </div>
  </div>

  <div class="footer">
    <p>Footer Section</p>
  </div>

</body>
</html>
