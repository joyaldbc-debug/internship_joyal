<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <nav class="navbar">
    <a class="logo">studiotopia</a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>book your day </h1>
    <p> pre book your day by calling or send us a message!</p>
  </div>


  <div class="contact-section">

    <div class="order-form">
      <h2>🎥book your day</h2>

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">
      </div>

      <div class="form-group">
        <label for="item">Select package</label>
        <select id="item">
          <option value="">-- Choose your package --</option>
          <option value="pre wedding">pre wedding photoshoot — ₹9999</option>
          <option value="engagement">engagement photoshoot — ₹17999</option>
          <option value="post wedding">post wedding photoshoot — ₹24999</option>
          <option value="custom">custom package — ₹8999</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">enter your location</label>
        <textarea id="location" placeholder="Enter your full address..."></textarea>
      </div>
    </div>

    <div class="info-box">
      <h2>Contact Info</h2>

      <div class="info-item">
        <div class="text">
          <h4>Phone</h4>
          <p>+912345678901 </p>
        </div>
      </div>

      <div class="info-item">
        <div class="text">
          <h4>Email</h4>
          <p>for more details@studiotopia.com</p>
        </div>
      </div>

      <div class="info-item">
        <div class="text">
          <h4>Location</h4>
          <p>Kerala, India</p>
        </div>
      </div>

      <div class="info-item">
        <div class="text">
          <h4>Open Hours</h4>
          <p>Every day<br>9am – 10pm</p>
        </div>
      </div>
    </div>

  </div>
   <footer>
        <b>©️ All right Reserved</b>
    </footer>


</body>
</html>
