<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display & Position Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-top: 60px; 
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    h2 {
      margin-top: 30px;
      padding-left: 10px;
    }

    .box {
      padding: 10px;
      margin: 5px;
    }

    .image-container {
      position: relative;
      width: 200px;
      margin: 20px;
    }

    .image-container img {
      width: 100%;
      display: block;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 5px;
    }

    .flex-container {
      display: flex;
      gap: 10px;
      background: #eee;
      padding: 10px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <div class="navbar">Fixed Navbar</div>

  <h1 style="padding-left:10px;">Display & Position Demo</h1>

  <h2>1. Block</h2>
  <div class="box" style="display: block; background: lightblue;">Block 1</div>
  <div class="box" style="display: block; background: lightgreen;">Block 2</div>

  <h2>2. Inline</h2>
  <span class="box" style="display: inline; background: pink;">Inline 1</span>
  <span class="box" style="display: inline; background: orange;">Inline 2</span>

  <h2>3. Inline-block</h2>
  <div class="box" style="display: inline-block; width: 100px; height: 50px; background: coral;">Box 1</div>
  <div class="box" style="display: inline-block; width: 100px; height: 50px; background: teal;">Box 2</div>

  
  <h2>4. None</h2>
  <div class="box" style="display: none;">Hidden Element</div>
  <p style="padding-left:10px;">(Above element is hidden)</p>

  <h2>5. Flex</h2>
  <div class="flex-container">
    <div class="box" style="background: lightcoral;">Flex 1</div>
    <div class="box" style="background: lightseagreen;">Flex 2</div>
    <div class="box" style="background: lightsalmon;">Flex 3</div>
  </div>

  <h2>6. Grid</h2>
  <div class="grid-container">
    <div class="box" style="background: lavender;">Grid 1</div>
    <div class="box" style="background: lightyellow;">Grid 2</div>
    <div class="box" style="background: lightgray;">Grid 3</div>
  </div>

  <h2>7. Badge on Image (Position Absolute)</h2>
  <div class="image-container">
    <img src="img2.jpg.jpeg" alt="Sample Image">
    <div class="badge">New</div>
  </div>

</body>
</html>
